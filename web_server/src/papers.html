<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的论文 - 论文管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 论文管理系统</h1>
            <nav id="nav-menu">
                <a href="index.html">首页</a>
                <a href="login.html" id="login-link" style="display:none;">登录</a>
                <a href="register.html" id="register-link" style="display:none;">注册</a>
                <a href="papers.html" class="active">我的论文</a>
                <a href="#" id="logout-link" onclick="logout()">退出登录</a>
            </nav>
        </header>
        
        <main>
            <section class="papers-section">
                <h2>我的论文收藏</h2>
                <p id="welcome-message">正在加载您的论文收藏...</p>
                
                <div class="paper-actions">
                    <div class="add-paper-form">
                        <h3>添加论文</h3>
                        <form id="add-paper-form">
                            <div class="form-group">
                                <label for="arxiv_id">arXiv ID</label>
                                <input type="text" id="arxiv_id" name="arxiv_id" 
                                       placeholder="例如: 2401.12345" required>
                                <small>请输入arXiv论文的ID</small>
                            </div>
                            <button type="submit" class="btn btn-primary">添加收藏</button>
                        </form>
                        <div id="add-message" class="message"></div>
                    </div>
                    
                    <div class="delete-paper-form">
                        <h3>删除论文</h3>
                        <form id="delete-paper-form">
                            <div class="form-group">
                                <label for="delete_arxiv_id">arXiv ID</label>
                                <input type="text" id="delete_arxiv_id" name="arxiv_id" 
                                       placeholder="输入要删除的arXiv ID" required>
                            </div>
                            <button type="submit" class="btn btn-danger">删除收藏</button>
                        </form>
                        <div id="delete-message" class="message"></div>
                    </div>
                </div>
                
                <div class="papers-list">
                    <h3>收藏列表</h3>
                    <div id="papers-container">
                        <p>正在加载论文列表...</p>
                    </div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2026 论文管理系统 - Papers Agent</p>
        </footer>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // 检查登录状态
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            if (!isLoggedIn) {
                window.location.href = 'login.html';
                return;
            }
            
            // 显示欢迎信息
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('welcome-message').textContent = 
                `欢迎回来，${user.username || '用户'}！`;
            
            // 加载论文列表
            await loadPapers();
            
            // 设置添加论文表单
            document.getElementById('add-paper-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                const arxivId = document.getElementById('arxiv_id').value;
                const messageDiv = document.getElementById('add-message');
                
                try {
                    messageDiv.className = 'message';
                    messageDiv.textContent = '添加中...';
                    
                    const result = await API.addPaper(arxivId);
                    
                    if (result.code === 200) {
                        messageDiv.className = 'message success';
                        messageDiv.textContent = '论文添加成功！';
                        document.getElementById('arxiv_id').value = '';
                        
                        // 重新加载论文列表
                        await loadPapers();
                    } else {
                        messageDiv.className = 'message error';
                        messageDiv.textContent = result.message || '添加失败';
                    }
                } catch (error) {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '网络错误，请稍后重试';
                    console.error('Add paper error:', error);
                }
            });
            
            // 设置删除论文表单
            document.getElementById('delete-paper-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                const arxivId = document.getElementById('delete_arxiv_id').value;
                const messageDiv = document.getElementById('delete-message');
                
                try {
                    messageDiv.className = 'message';
                    messageDiv.textContent = '删除中...';
                    
                    const result = await API.deletePaper(arxivId);
                    
                    if (result.code === 200) {
                        messageDiv.className = 'message success';
                        messageDiv.textContent = '论文删除成功！';
                        document.getElementById('delete_arxiv_id').value = '';
                        
                        // 重新加载论文列表
                        await loadPapers();
                    } else {
                        messageDiv.className = 'message error';
                        messageDiv.textContent = result.message || '删除失败';
                    }
                } catch (error) {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '网络错误，请稍后重试';
                    console.error('Delete paper error:', error);
                }
            });
        });
        
        async function loadPapers() {
            const container = document.getElementById('papers-container');
            
            try {
                const result = await API.getPapers();
                
                if (result.code === 200 && result.papers && result.papers.length > 0) {
                    let html = '<div class="papers-grid">';
                    
                    result.papers.forEach(paper => {
                        html += `
                            <div class="paper-card">
                                <h4>${paper.title || '无标题'}</h4>
                                <p><strong>arXiv ID:</strong> ${paper['arxiv id']}</p>
                                <div class="paper-actions">
                                    <button class="btn btn-small" onclick="copyArxivId('${paper['arxiv id']}')">复制ID</button>
                                </div>
                            </div>
                        `;
                    });
                    
                    html += '</div>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<p>您还没有收藏任何论文。</p>';
                }
            } catch (error) {
                container.innerHTML = '<p class="error">加载论文列表失败，请稍后重试。</p>';
                console.error('Load papers error:', error);
            }
        }
        
        function copyArxivId(arxivId) {
            navigator.clipboard.writeText(arxivId).then(() => {
                alert(`已复制 arXiv ID: ${arxivId}`);
            });
        }
    </script>
</body>
</html>
