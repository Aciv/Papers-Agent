<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 论文管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 论文管理系统</h1>
            <nav id="nav-menu">
                <a href="index.html">首页</a>
                <a href="login.html">登录</a>
                <a href="register.html" class="active">注册</a>
            </nav>
        </header>
        
        <main>
            <section class="form-section">
                <h2>用户注册</h2>
                
                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" name="username" 
                               placeholder="请输入用户名" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <input type="email" id="email" name="email" 
                               placeholder="请输入邮箱" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" 
                               placeholder="请输入密码" required minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm_password">确认密码</label>
                        <input type="password" id="confirm_password" name="confirm_password" 
                               placeholder="请再次输入密码" required>
                    </div>
                    
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">注册</button>
                    </div>
                    
                    <div id="register-message" class="message"></div>
                    
                    <p class="form-footer">
                        已有账号？<a href="login.html">立即登录</a>
                    </p>
                </form>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2026 论文管理系统 - Papers Agent</p>
        </footer>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const messageDiv = document.getElementById('register-message');
            
            // 验证密码匹配
            if (password !== confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '两次输入的密码不一致';
                return;
            }
            
            try {
                messageDiv.className = 'message';
                messageDiv.textContent = '注册中...';
                
                const result = await API.register(username, password, email);
                
                if (result.code === 200) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '注册成功！正在跳转到登录页面...';
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = result.message || '注册失败';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '网络错误，请稍后重试';
                console.error('Register error:', error);
            }
        });
    </script>
</body>
</html>
