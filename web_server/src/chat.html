<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能聊天助手 - 论文管理系统</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .chat-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #f9f9f9;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 80%;
        }
        
        .user-message {
            background-color: #007bff;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        
        .bot-message {
            background-color: #e9ecef;
            color: #333;
            margin-right: auto;
        }
        
        .chat-input {
            display: flex;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .chat-input button {
            padding: 12px 24px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .chat-input button:hover {
            background-color: #0056b3;
        }
        
        .chat-input button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        
        .connection-status {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }
        
        .connected {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .disconnected {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .connecting {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .message-time {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 5px;
        }
        
        .chat-info {
            background-color: #e7f3ff;
            border-left: 4px solid #007bff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 智能聊天助手</h1>
            <nav id="nav-menu">
                <a href="index.html">首页</a>
                <a href="login.html" id="login-link">登录</a>
                <a href="register.html" id="register-link">注册</a>
                <a href="papers.html" id="papers-link" style="display:none;">我的论文</a>
                <a href="chat.html" class="active">智能聊天</a>
                <a href="#" id="logout-link" style="display:none;" onclick="logout()">退出登录</a>
            </nav>
        </header>
        
        <main>
            <div class="chat-container">
                <div class="chat-header">
                    <h2>论文智能助手</h2>
                    <p>基于AI的论文查询和问答系统，帮助您更好地理解和查找学术论文</p>
                </div>
                
                <div class="chat-info">
                    <p><strong>💡 使用提示：</strong></p>
                    <ul>
                        <li>您可以询问关于论文查询、学术问题、研究建议等</li>
                        <li>系统会基于您的收藏论文和历史记录提供个性化回答</li>
                        <li>支持自然语言查询，例如："帮我找一些关于深度学习的论文"</li>
                    </ul>
                </div>
                
                <div id="connection-status" class="connection-status disconnected">
                    🔴 未连接到聊天服务器
                </div>
                
                <div id="chat-messages" class="chat-messages">
                    <div class="message bot-message">
                        <p>👋 您好！我是论文智能助手，可以帮助您查询和管理学术论文。</p>
                        <p>请先登录系统，然后我可以基于您的收藏论文提供个性化帮助。</p>
                        <div class="message-time">系统消息</div>
                    </div>
                </div>
                
                <div class="chat-input">
                    <input type="text" id="message-input" placeholder="输入您的问题..." disabled>
                    <button id="send-button" onclick="sendMessage()" disabled>发送</button>
                </div>
                
                <div style="margin-top: 20px; text-align: center;">
                    <button id="connect-button" onclick="connectWebSocket()" class="btn btn-primary">连接聊天助手</button>
                    <button id="disconnect-button" onclick="disconnectWebSocket()" class="btn" style="display:none;">断开连接</button>
                </div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 论文管理系统 - Papers Agent</p>
        </footer>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chat.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
            // 检查用户是否已登录，如果已登录则自动连接
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            if (isLoggedIn) {
                document.getElementById('connect-button').click();
            }
        });
    </script>
</body>
</html>
